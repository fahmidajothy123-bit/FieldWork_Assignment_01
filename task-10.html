<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 - Fetch with Timeout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="fetchWithTimeout.js"></script>
    <style> pre { background: #1e2937; color: #e0f2fe; } </style>
</head>
<body class="bg-gray-950 text-white min-h-screen py-12">
<div class="max-w-2xl mx-auto px-6">
    <a href="index.html" class="text-blue-400 hover:underline mb-8 inline-block">← Back to All Tasks</a>
    <h1 class="text-4xl font-bold mb-2">10. Fetch with Timeout</h1>
    <p class="text-gray-400 mb-8">Async fetch with timeout handling.</p>

    <div class="bg-gray-900 rounded-3xl p-8">
        <button onclick="runTask()" class="w-full bg-purple-600 hover:bg-purple-700 py-5 rounded-2xl font-semibold text-xl">Test Fetch with Timeout</button>
        <pre id="output" class="mt-8 p-6 rounded-2xl text-lg"></pre>
    </div>
</div>
<script>
    async function print(text) { 
        document.getElementById('output').textContent = text; 
    }
    async function runTask() {
        print("Fetching data...\n");
        try {
            const data = await fetchWithTimeout('https://jsonplaceholder.typicode.com/todos/1', 8000);
            print(`✅ Success!\nTitle: ${data.title}`);
        } catch (error) {
            print(`❌ ${error.message}`);
        }
    }
    window.onload = runTask;
</script>
</body>
</html>
