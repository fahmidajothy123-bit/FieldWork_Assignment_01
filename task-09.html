<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09 - Memoize</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="memoize.js"></script>
    <style> pre { background: #1e2937; color: #e0f2fe; } </style>
</head>
<body class="bg-gray-950 text-white min-h-screen py-12">
<div class="max-w-2xl mx-auto px-6">
    <a href="index.html" class="text-blue-400 hover:underline mb-8 inline-block">← Back to All Tasks</a>
    <h1 class="text-4xl font-bold mb-2">09. Memoize Function</h1>
    <p class="text-gray-400 mb-8">Optimize function with caching.</p>

    <div class="bg-gray-900 rounded-3xl p-8">
        <button onclick="runTask()" class="w-full bg-emerald-600 hover:bg-emerald-700 py-5 rounded-2xl font-semibold text-xl">Test Memoization</button>
        <pre id="output" class="mt-8 p-6 rounded-2xl text-lg"></pre>
    </div>
</div>
<script>
    function print(text) { document.getElementById('output').textContent = text; }
    function runTask() {
        const add = (a, b) => a + b;
        const memoizedAdd = memoize(add);

        const res1 = memoizedAdd(6, 8);
        const res2 = memoizedAdd(6, 8);

        print(`6 + 8 = ${res1}\nCalled again = ${res2}\n\n✅ Memoization is working!`);
    }
    window.onload = runTask;
</script>
</body>
</html>
